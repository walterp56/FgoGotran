name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Build
        working-directory: web
        run: npm run build

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::599633425476:role/fgogotran-web-github-deploy-role
          aws-region: ap-east-1

      - name: Upload to S3
        run: aws s3 sync web/out s3://fgogotran-web-prod --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E2WVK9W76IHL91 --paths "/*"